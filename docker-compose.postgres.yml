services:
  postgres:
    image: postgres:16-alpine
    container_name: swiftpos-postgres
    environment:
      POSTGRES_DB: swiftpos
      POSTGRES_USER: swiftpos
      POSTGRES_PASSWORD: swiftpos_dev
    ports:
      - "5432:5432"
    volumes:
      - swiftpos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftpos -d swiftpos"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  swiftpos_postgres_data:
